<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart URL Replacer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="card">
      <h1>URL Settings</h1>
      <p class="hint">Set your URL template and replace token. Changes apply immediately after save.</p>

      <label for="urlTemplate">URL Template</label>
      <input id="urlTemplate" type="text" autocomplete="off" />

      <label for="replaceToken">Replace Token</label>
      <input id="replaceToken" type="text" autocomplete="off" />

      <button id="saveBtn" type="button">Save</button>
      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
